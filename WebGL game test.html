<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Infinito - Primera Persona</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px; pointer-events: none; user-select: none; font-size: 14px; z-index: 100; }
        #instrucciones { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.5); padding: 8px 18px; border-radius: 20px; font-size: 14px; pointer-events: none; user-select: none; z-index: 100; letter-spacing: 1px; }
        #cruz { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.3); font-size: 30px; pointer-events: none; user-select: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="info">🎮 Mundo Infinito</div>
    <div id="instrucciones">WASD · Moverse &nbsp;|&nbsp; RATÓN · Mirar &nbsp;|&nbsp; ESPACIO · Saltar</div>
    <div id="cruz">+</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as three from 'three';

        let escena, camara, renderizador;
        let jugador = new three.Vector3(0, 1.6, 0);
        let velocidad_movimiento = 0.2;
        let fuerza_salto = 0.2;
        let gravedad = -0.01;
        let velocidad_y = 0;
        let en_suelo = true;
        let angulo_horizontal = 0;
        let angulo_vertical = 0;
        let esta_bloqueado = false;
        let teclas = { w: false, a: false, s: false, d: false, espacio: false };
        let chunks_cargados = new Map();
        let tamanio_chunk = 16;
        let distancia_vision = 4;
        let ultimo_chunk_x = 0;
        let ultimo_chunk_z = 0;
        let geometrias_compartidas = {};

        function crear_geometrias_compartidas() {
            geometrias_compartidas.plataforma = new three.BoxGeometry(1.8, 0.4, 1.8);
            geometrias_compartidas.columna = new three.BoxGeometry(0.6, 2.5, 0.6);
            geometrias_compartidas.tronco = new three.CylinderGeometry(0.3, 0.4, 1.5, 5);
            geometrias_compartidas.copa = new three.SphereGeometry(0.9, 5, 5);
            geometrias_compartidas.roca = new three.DodecahedronGeometry(0.5);
            geometrias_compartidas.suelo = new three.PlaneGeometry(tamanio_chunk, tamanio_chunk);
        }

        function generar_chunk(chunk_x, chunk_z) {
            const grupo = new three.Group();
            const semilla = chunk_x * 1000 + chunk_z;
            const random = (s) => { let h = s * 9301 + 49297; return (h % 233280) / 233280; };
            const rng = (s) => random(s + semilla);

            const suelo = new three.Mesh(
                geometrias_compartidas.suelo,
                new three.MeshLambertMaterial({ color: 0x7CB342 })
            );
            suelo.rotation.x = -Math.PI/2;
            suelo.position.set(0, -0.25, 0);
            grupo.add(suelo);

            const colores = [0xFF6B6B, 0x4ECDC4, 0xFFE66D, 0xA29BFE, 0xFD79A8];
            const num_plataformas = 3 + Math.floor(rng(1) * 4);
            for (let i = 0; i < num_plataformas; i++) {
                const x = (rng(i+10) - 0.5) * tamanio_chunk * 0.7;
                const z = (rng(i+20) - 0.5) * tamanio_chunk * 0.7;
                if (Math.abs(x) < 1.5 && Math.abs(z) < 1.5) continue;
                const plata = new three.Mesh(
                    geometrias_compartidas.plataforma,
                    new three.MeshLambertMaterial({ color: colores[Math.floor(rng(i+30) * colores.length)] })
                );
                plata.position.set(x, 0.2, z);
                grupo.add(plata);
            }

            const num_arboles = 2 + Math.floor(rng(2) * 3);
            for (let i = 0; i < num_arboles; i++) {
                const x = (rng(i+40) - 0.5) * tamanio_chunk * 0.7;
                const z = (rng(i+50) - 0.5) * tamanio_chunk * 0.7;
                if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;
                const arbol = new three.Group();
                const tronco = new three.Mesh(
                    geometrias_compartidas.tronco,
                    new three.MeshLambertMaterial({ color: 0x8B5A2B })
                );
                tronco.position.y = 0.75;
                arbol.add(tronco);
                const copa = new three.Mesh(
                    geometrias_compartidas.copa,
                    new three.MeshLambertMaterial({ color: 0x2E8B57 })
                );
                copa.position.y = 1.8;
                arbol.add(copa);
                arbol.position.set(x, 0, z);
                grupo.add(arbol);
            }

            const num_rocas = 2 + Math.floor(rng(3) * 3);
            for (let i = 0; i < num_rocas; i++) {
                const x = (rng(i+60) - 0.5) * tamanio_chunk * 0.7;
                const z = (rng(i+70) - 0.5) * tamanio_chunk * 0.7;
                if (Math.abs(x) < 1.5 && Math.abs(z) < 1.5) continue;
                const roca = new three.Mesh(
                    geometrias_compartidas.roca,
                    new three.MeshLambertMaterial({ color: 0x808080 })
                );
                const escala = 0.4 + rng(i+80) * 0.6;
                roca.scale.set(escala, escala * 0.7, escala);
                roca.position.set(x, 0.3, z);
                roca.rotation.y = rng(i+90) * Math.PI * 2;
                grupo.add(roca);
            }

            const num_columnas = 1 + Math.floor(rng(4) * 2);
            for (let i = 0; i < num_columnas; i++) {
                const x = (rng(i+100) - 0.5) * tamanio_chunk * 0.6;
                const z = (rng(i+110) - 0.5) * tamanio_chunk * 0.6;
                if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;
                const columna = new three.Mesh(
                    geometrias_compartidas.columna,
                    new three.MeshLambertMaterial({ color: 0x95B8D1 })
                );
                columna.position.set(x, 1.25, z);
                grupo.add(columna);
            }

            return grupo;
        }

        function inicializar_escena() {
            escena = new three.Scene();
            escena.background = new three.Color(0x87CEEB);
            escena.fog = new three.Fog(0x87CEEB, 30, 50);
            
            camara = new three.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camara.position.copy(jugador);
            
            renderizador = new three.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderizador.setSize(window.innerWidth, window.innerHeight);
            renderizador.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderizador.domElement);
            
            const luz_ambiente = new three.AmbientLight(0x404060);
            escena.add(luz_ambiente);
            
            const luz_direccional = new three.DirectionalLight(0xffeedd, 1);
            luz_direccional.position.set(10, 20, 10);
            escena.add(luz_direccional);
            
            const luz_relleno = new three.DirectionalLight(0x4466ff, 0.3);
            luz_relleno.position.set(-10, 5, -10);
            escena.add(luz_relleno);
        }

        function actualizar_chunks() {
            const chunk_x = Math.floor(jugador.x / tamanio_chunk);
            const chunk_z = Math.floor(jugador.z / tamanio_chunk);
            
            if (chunk_x === ultimo_chunk_x && chunk_z === ultimo_chunk_z) return;
            ultimo_chunk_x = chunk_x;
            ultimo_chunk_z = chunk_z;

            const chunks_a_cargar = [];
            for (let dx = -distancia_vision; dx <= distancia_vision; dx++) {
                for (let dz = -distancia_vision; dz <= distancia_vision; dz++) {
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    if (dist <= distancia_vision) {
                        chunks_a_cargar.push(`${chunk_x + dx},${chunk_z + dz}`);
                    }
                }
            }

            const chunks_actuales = new Set(chunks_a_cargar);
            for (const [key, grupo] of chunks_cargados) {
                if (!chunks_actuales.has(key)) {
                    escena.remove(grupo);
                    chunks_cargados.delete(key);
                }
            }

            for (const key of chunks_a_cargar) {
                if (!chunks_cargados.has(key)) {
                    const [cx, cz] = key.split(',').map(Number);
                    const grupo = generar_chunk(cx, cz);
                    grupo.position.set(cx * tamanio_chunk, 0, cz * tamanio_chunk);
                    escena.add(grupo);
                    chunks_cargados.set(key, grupo);
                }
            }
        }

        function manejar_teclas(event) {
            const tecla = event.key.toLowerCase();
            if (tecla === 'w') teclas.w = event.type === 'keydown';
            if (tecla === 'a') teclas.a = event.type === 'keydown';
            if (tecla === 's') teclas.s = event.type === 'keydown';
            if (tecla === 'd') teclas.d = event.type === 'keydown';
            if (tecla === ' ' || event.code === 'Space') {
                teclas.espacio = event.type === 'keydown';
                event.preventDefault();
            }
        }

        function manejar_raton(event) {
            if (esta_bloqueado) {
                angulo_horizontal -= event.movementX * 0.002;
                angulo_vertical -= event.movementY * 0.002;
                angulo_vertical = Math.max(-1.2, Math.min(1.2, angulo_vertical));
            }
        }

        function actualizar_jugador() {
            const adelante = new three.Vector3(-Math.sin(angulo_horizontal), 0, -Math.cos(angulo_horizontal));
            const derecha = new three.Vector3(Math.cos(angulo_horizontal), 0, -Math.sin(angulo_horizontal));
            const direccion = new three.Vector3(0, 0, 0);
            
            if (teclas.w) direccion.add(adelante);
            if (teclas.s) direccion.sub(adelante);
            if (teclas.a) direccion.sub(derecha);
            if (teclas.d) direccion.add(derecha);
            
            if (direccion.length() > 0) {
                direccion.normalize();
                jugador.x += direccion.x * velocidad_movimiento;
                jugador.z += direccion.z * velocidad_movimiento;
            }

            if (teclas.espacio && en_suelo) {
                velocidad_y = fuerza_salto;
                en_suelo = false;
            }

            velocidad_y += gravedad;
            jugador.y += velocidad_y;
            
            if (jugador.y <= 1.6) {
                jugador.y = 1.6;
                velocidad_y = 0;
                en_suelo = true;
            }

            const euler = new three.Euler(angulo_vertical, angulo_horizontal, 0, 'YXZ');
            camara.quaternion.setFromEuler(euler);
            camara.position.copy(jugador);
            
            actualizar_chunks();
        }

        function bloquear_raton() {
            if (!esta_bloqueado) {
                renderizador.domElement.requestPointerLock();
            }
        }

        function animar() {
            requestAnimationFrame(animar);
            actualizar_jugador();
            renderizador.render(escena, camara);
            esta_bloqueado = document.pointerLockElement === renderizador.domElement;
        }

        function redimensionar() {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            renderizador.setSize(window.innerWidth, window.innerHeight);
        }

        try {
            crear_geometrias_compartidas();
            inicializar_escena();
            actualizar_chunks();
            
            window.addEventListener('keydown', manejar_teclas);
            window.addEventListener('keyup', manejar_teclas);
            window.addEventListener('mousemove', manejar_raton);
            window.addEventListener('click', bloquear_raton);
            window.addEventListener('resize', redimensionar);
            animar();
        } catch (e) {
            console.error('Error:', e);
        }

        window.addEventListener('beforeunload', function() {});
    </script>
</body>
</html>
